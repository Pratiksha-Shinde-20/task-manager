<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Task Manager</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Container */
.container {
  background: white;
  width: 90%;
  max-width: 400px;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}

/* Heading */
h2 {
  color: #333;
}

/* Inputs */
input {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* Buttons */
button {
  padding: 10px;
  margin: 5px;
  width: 95%;
  border: none;
  border-radius: 8px;
  background: #4facfe;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #007bff;
}

/* Task List */
ul {
  list-style: none;
  padding: 0;
}

li {
  display: flex;
  justify-content: space-between;
  background: #f2f2f2;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
}

/* Completed */
.done {
  text-decoration: line-through;
  color: gray;
}

/* Responsive */
@media (max-width: 500px) {
  .container {
    width: 95%;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>🚀 Task Manager</h2>

  <!-- Login -->
  <input type="text" id="username" placeholder="Enter Username">
  <button onclick="login()">Login</button>

  <hr>

  <!-- Add Task -->
  <input type="text" id="taskInput" placeholder="Enter task">
  <button onclick="addTask()">Add Task</button>

  <ul id="taskList"></ul>
</div>

<script>
let user = "";

// Login
function login() {
  user = document.getElementById("username").value;
  if(user === "") return alert("Enter username");
  alert("Welcome " + user);
  loadTasks();
}

// Add Task
function addTask() {
  let task = document.getElementById("taskInput").value;
  if(task === "") return alert("Enter task");

  fetch("http://localhost:5000/add", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ task, user })
  }).then(() => {
    document.getElementById("taskInput").value = "";
    loadTasks();
  });
}

// Load Tasks
function loadTasks() {
  fetch(`http://localhost:5000/tasks?user=${user}`)
  .then(res => res.json())
  .then(data => {
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    data.forEach((t, i) => {
      let li = document.createElement("li");

      li.innerHTML = `
        <span class="${t.done ? 'done' : ''}" onclick="toggle(${i})">
          ${t.task}
        </span>
        <button onclick="deleteTask(${i})">❌</button>
      `;

      list.appendChild(li);
    });
  });
}

// Delete
function deleteTask(index) {
  fetch(`http://localhost:5000/delete/${index}`, {
    method: "DELETE"
  }).then(loadTasks);
}

// Toggle Complete
function toggle(index) {
  fetch(`http://localhost:5000/toggle/${index}`, {
    method: "PUT"
  }).then(loadTasks);
}
</script>

</body>
</html>
